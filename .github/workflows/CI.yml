name: MLflow CI/CD Workflow

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # Checkout Code
      - name: Run actions/checkout@v3
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # Set up Python 3.12.7
      - name: Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: '3.12.7'

      # Check environment
      - name: Check Env
        run: env

      # Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow==2.19.0 pandas scikit-learn

      # Menjalankan folder MLProject menggunakan local manager
      - name: Run MLflow Project
        run: |
          mlflow run MLProject --env-manager=local

      # Mengambil RUN_ID terbaru dari folder mlruns
      - name: Get latest MLflow run_id
        run: |
          # Extract the actual Run ID dynamically from anywhere in the workspace
          RUN_ID=$(find . -name "meta.yaml" | grep "/0/" | head -n 1 | xargs dirname | xargs basename)
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
          echo "Discovered System Run ID: $RUN_ID"
          
          # Find where the actual 'model' directory was written
          MODEL_SOURCE_PATH=$(find . -type d -name "model" | grep "$RUN_ID" | head -n 1)
          echo "Found Model Directory Source Path at: $MODEL_SOURCE_PATH"
          
          # Reconstruct the clean, unified target structure at root level
          mkdir -p mlruns/0/$RUN_ID/artifacts
          
          # Copy the found model folder cleanly into the correct target root structure
          cp -r $MODEL_SOURCE_PATH mlruns/0/$RUN_ID/artifacts/
          echo "Success: Artifacts fully mirrored to root workspace context!"
          
          # Print out structural layouts to workflow logs for debugging transparency
          ls -R mlruns/

      # Install python dependencies 
      - name: Install python dependencies
        run: |
          pip install mlflow==2.19.0 numpy pandas scikit-learn

      # Simpan mlruns ke repo menggunakan tag safety [skip ci] agar tidak terjadi infinite loop
      - name: Upload to GitHub
        run: |
          git config --global user.name "${{ secrets.USERNAME }}"
          git config --global user.email "${{ secrets.EMAIL }}"
          git add -f mlruns/
          git commit -m "Automated: Save MLflow artifacts from CI [skip ci]" || true
          git push origin main


      # Build Docker Model
      - name: Build Docker Model
        run: |
          mlflow models build-docker \
            --model-uri "runs:/$RUN_ID/model" \
            --name "gaming-vs-academic-model" \
            --env-manager "local"

      # Login ke Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      # Tag the Docker image
      - name: Tag Docker Image
        run: |
          docker tag gaming-vs-academic-model ${{ secrets.DOCKER_HUB_USERNAME }}/workflow-ci:latest

      # Push Docker image ke Docker Hub
      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/workflow-ci:latest
