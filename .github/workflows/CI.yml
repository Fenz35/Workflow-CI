name: MLflow CI/CD Workflow

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # Checkout Code
      - name: Run actions/checkout@v3
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # Set up Python 3.12.7
      - name: Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: '3.12.7'

      # Check environment
      - name: Check Env
        run: env

      # Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow==2.19.0 pandas scikit-learn

      # Run MLflow
      - name: Run MLflow Project
        run: |
          mlflow run MLProject --experiment-name="Gaming_Academic_Performance_Basic" --env-manager=local

      # Get latest MLflow run_id
      - name: Get latest MLflow run_id
        run: |
          RUN_ID=$(find MLProject/mlruns/0/ -maxdepth 1 -type d -regextype posix-extended -regex '.*/[a-f0-9]{32}$' | xargs basename)
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
          echo "True Active run_id parsed cleanly: $RUN_ID"

      - name: Align Tracking Folders for Docker Build
        run: |
          cp -r MLProject/mlruns ./mlruns
          echo "Folder mlruns successfully mirrored to root workspace."

      # Install python dependencies 
      - name: Install python dependencies
        run: |
          pip install mlflow==2.19.0 numpy pandas scikit-learn

      # Simpan mlruns ke repo menggunakan tag safety [skip ci] agar tidak terjadi infinite loop
      - name: Upload to GitHub
        run: |
          git config --global user.name "${{ secrets.USERNAME }}"
          git config --global user.email "${{ secrets.EMAIL }}"
          git add -f mlruns/
          git commit -m "Automated: Save MLflow artifacts from CI [skip ci]" || true
          git push origin main


      # Build Docker Model
      - name: Build Docker Model
        run: |
          mlflow models build-docker \
            --model-uri "runs:/$RUN_ID/model" \
            --name "gaming-vs-academic-model" \
            --env-manager "local"

      # Login ke Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      # Tag the Docker image
      - name: Tag Docker Image
        run: |
          docker tag gaming-vs-academic-model ${{ secrets.DOCKER_HUB_USERNAME }}/workflow-ci:latest

      # Push Docker image ke Docker Hub
      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/workflow-ci:latest
